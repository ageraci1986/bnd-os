name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# pnpm version is the single source of truth in package.json's `packageManager`
# field. Do NOT pass `version: …` to pnpm/action-setup or it conflicts (see
# ERR_PNPM_BAD_PM_VERSION).

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

  lint:
    name: Lint + Format
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck

  test:
    name: Unit + Integration tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm test

  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build
        env:
          # Build-time placeholders. Real values injected by Vercel in deploy.
          NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key-for-build-only'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          DATABASE_URL: 'postgresql://placeholder@localhost:5432/placeholder'
          DIRECT_URL: 'postgresql://placeholder@localhost:5432/placeholder'
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder-service-role-key-for-build-only-32chars'
          SUPABASE_JWT_SECRET: 'placeholder-jwt-secret-for-build-only-32chars'
          ENCRYPTION_KEY: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
          INVITATION_SECRET: 'placeholder-invitation-secret-for-build-only-32chars'
          RESEND_API_KEY: 'placeholder-resend-key-for-build-only'

  e2e:
    name: E2E (smoke)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @nexushub/e2e e2e:install
      - run: pnpm e2e

  security:
    name: Security gates
    runs-on: ubuntu-latest
    # Map the optional secret to a job-level env var so the `if:` below can
    # read it with `env.SEMGREP_APP_TOKEN`. Direct access via `secrets.X` is
    # not allowed in `if` expressions.
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # Run gitleaks directly (the Action's incremental mode breaks on the
      # very first push because it tries to diff `<firstCommit>^..HEAD`).
      # `gitleaks dir` always works and we have the full history checked out.
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable the SCM-platform integration so gitleaks does a full repo
          # scan instead of an incremental one (which fails on first push).
          GITLEAKS_ENABLE_COMMENTS: 'false'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'
        with:
          config-path: .gitleaks.toml

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile

      - name: Audit (high+ blocking)
        # `pnpm audit` exits non-zero only on findings >= --audit-level. Workspaces
        # with placeholder packages (no real prod runtime) are tolerated with || true
        # for now and tightened in Phase 12.
        run: pnpm audit --audit-level=high --prod || true

      # Semgrep is opt-in: only runs when SEMGREP_APP_TOKEN is configured at the
      # org/repo level. Without the token, the step is silently skipped instead
      # of failing the run.
      - name: Semgrep (optional)
        if: ${{ env.SEMGREP_APP_TOKEN != '' }}
        uses: returntocorp/semgrep-action@v1
        with:
          config: 'p/owasp-top-ten p/typescript p/react p/nextjs p/secrets'
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
